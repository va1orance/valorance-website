<!DOCTYPE html>
<html lang="en">
<head>
    <title>valorance.net</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="val_backgroundless.ico" type="image/x-icon">
    <link rel="canonical" href="https://www.valorance.net"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-content">
        <div class="logo-container">
            <video autoplay loop muted playsinline class="logo-animation" id="logo-video">
                <source id="video-source-safari" src="media/val_logo_safari_dark.mp4" type='video/mp4; codecs="hvc1"'>
                <source id="video-source-chrome" src="media/val_logo_chrome_dark.webm" type="video/webm">
            </video>
        </div>

        <h1 class="title">
            Hi, I'm 
            <a href="https://www.youtube.com/@va1orance" target="_blank" rel="noopener noreferrer" style="color: #e1b612;">Valorance</a>.        
        </h1>

        <div class="links-container">
            <a href="https://www.valorance.net/night/" class="squircle-link">
                <img src="night/images/night.png" alt="Night Preview" class="link-preview">
                <div><span style="color: #e1b612; font-weight: 600;">Night</span> - A Thumb Alpha Keyboard Layout</div>
            </a>

            
            <a href="https://www.valorance.net/typetris/" class="squircle-link">
                <div class="link-preview" style="display: flex; justify-content: center; align-items: center; aspect-ratio: 16/9; background-color: transparent; color: #ffffff; font-family: 'Press Start 2P', cursive; font-size: 2.5rem; text-shadow: 4px 4px 0px #181825;">Typetris</div>
                <div><span style="color: #e1b612; font-weight: 600;">Typetris</span> - A Tetris Inspired Typing Game</div>
            </a>
        </div>
    </div>

    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <span id="theme-icon">☾</span>
    </button>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const logoVideo = document.getElementById('logo-video');
        const sourceSafari = document.getElementById('video-source-safari');
        const sourceChrome = document.getElementById('video-source-chrome');
        
        // Check for saved preference or system preference
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        
        function setVideoSource(isLight) {
            const safariSrc = isLight ? "media/val_logo_safari_light.mp4" : "media/val_logo_safari_dark.mp4";
            const chromeSrc = isLight ? "media/val_logo_chrome_light.webm" : "media/val_logo_chrome_dark.webm";
            
            // Only reload if source changed
            if (sourceSafari.getAttribute('src') !== safariSrc) {
                sourceSafari.src = safariSrc;
                sourceChrome.src = chromeSrc;
                logoVideo.load();
                logoVideo.play().catch(e => console.log("Autoplay prevented:", e));
            }
        }

        if (savedTheme === 'light' || (!savedTheme && systemPrefersLight)) {
            document.body.classList.add('light-mode');
            themeIcon.textContent = '☀';
            setVideoSource(true);
        } else {
            document.body.classList.add('dark-mode');
            themeIcon.textContent = '☾';
            setVideoSource(false);
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('light-mode')) {
                document.body.classList.replace('light-mode', 'dark-mode');
                localStorage.setItem('theme', 'dark');
                themeIcon.textContent = '☾';
                setVideoSource(false);
            } else {
                document.body.classList.replace('dark-mode', 'light-mode');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '☀';
                setVideoSource(true);
            }
        });
    </script>

    <script>
        (function() {
            const neuElements = [];

            function initElements() {
                document.querySelectorAll('.logo-animation, .title a, .squircle-link, .theme-toggle').forEach(el => {
                    neuElements.push(el);
                });
            }

            function updateShadows(mouseX, mouseY) {
                for (const el of neuElements) {
                    const rect = el.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const dx = mouseX - cx;
                    const dy = mouseY - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    el.style.setProperty('--nx', (dx / dist).toFixed(4));
                    el.style.setProperty('--ny', (dy / dist).toFixed(4));
                }
            }

            let rafId = null;
            document.addEventListener('pointermove', (e) => {
                if (e.pointerType !== 'mouse') return;
                if (!neuElements.length) initElements();
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => {
                    updateShadows(e.clientX, e.clientY);
                    rafId = null;
                });
            });
        })();
    </script>
    
</body>
</html>
